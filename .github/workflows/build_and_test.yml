name: Build and Test 🛠️

on:
  workflow_dispatch: null
  pull_request:
    branches:
      - master
jobs:
  GoSetup:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Setup Go
        uses: actions/setup-go@v4
      - run: |
          go mod tidy
      
  GoBuild:
    timeout-minutes: 10
    needs: GoSetup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - run: go build -v ./...
          
  GoTest:
    timeout-minutes: 30
    needs: GoSetup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Create .env.override
        uses: 1arp/create-a-file-action@0.3
        with:
          file: '.env.override'
      - run: go test -timeout 0 ./domain/... -v 
  GoTestCoverage:
    timeout-minutes: 20
    needs: GoTest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - run: |
          go test -covermode=atomic -coverpkg=./domain/... ./domain/...
  SvelteTest:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - working-directory: ./svelte
        run: |
          npm install
          node build.js